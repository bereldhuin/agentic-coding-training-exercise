<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LeBonPoint Marketplace</title>
    <style>
      :root {
        --bg: #f4f2ef;
        --panel: #ffffff;
        --text: #1f2328;
        --muted: #6b7280;
        --accent: #f28a2e;
        --accent-strong: #d86d12;
        --border: #e6e1dc;
        --shadow: rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Verdana", "Arial", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      header {
        padding: 28px clamp(16px, 4vw, 64px) 18px;
        background: linear-gradient(110deg, #fff5ec, #ffffff 60%);
        border-bottom: 1px solid var(--border);
      }

      .header-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        flex-wrap: wrap;
      }

      .language-picker {
        display: grid;
        gap: 6px;
        min-width: 180px;
      }

      .language-picker label {
        font-size: 12px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 44px);
        letter-spacing: -0.02em;
      }

      header p {
        margin: 0;
        color: var(--muted);
      }

      main {
        padding: 24px clamp(16px, 4vw, 64px) 64px;
        display: grid;
        gap: 18px;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 12px 24px var(--shadow);
      }

      h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      form {
        display: grid;
        gap: 12px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }

      input,
      select {
        width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #fff;
        font-size: 14px;
        font-family: inherit;
      }

      button {
        justify-self: start;
        padding: 10px 18px;
        border: none;
        border-radius: 999px;
        background: var(--accent);
        color: #ffffff;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.12s ease, background 0.12s ease;
      }

      button:hover {
        background: var(--accent-strong);
        transform: translateY(-1px);
      }

      .muted {
        color: var(--muted);
        font-size: 13px;
      }

      .error {
        color: #c62828;
      }

      .panel-row {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.8fr);
        gap: 16px;
      }

      .is-hidden {
        display: none;
      }

      .items {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .item-card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        display: grid;
        gap: 6px;
        background: #ffffff;
        cursor: pointer;
      }

      .item-card:hover {
        border-color: var(--accent);
      }

      .item-title {
        font-weight: 600;
      }

      .badge {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        border-radius: 999px;
        padding: 3px 10px;
        background: #fff0e3;
        color: #7a3c0c;
        font-size: 12px;
      }

      .detail {
        display: grid;
        gap: 12px;
      }

      .detail h3 {
        margin: 0;
        font-size: 18px;
      }

      .detail-list {
        display: grid;
        gap: 6px;
        font-size: 14px;
      }

      .images {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .image-pill {
        background: #fff1e6;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        color: #8a4b17;
      }

      .inline {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .status {
        padding: 6px 10px;
        border-radius: 999px;
        background: #fff0e3;
        font-size: 12px;
        color: #8a4b17;
      }

      @media (max-width: 900px) {
        .panel-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-top">
        <div>
          <h1 data-i18n="app.title">LeBonPoint Marketplace</h1>
          <p class="muted" data-i18n="app.subtitle">Search, filter, and explore marketplace items in real time.</p>
        </div>
        <div class="language-picker">
          <label for="language-select" data-i18n="language.label">Language</label>
          <select id="language-select" aria-label="Language selector">
            <option value="en">English</option>
            <option value="fr">Francais</option>
            <option value="it">Italiano</option>
            <option value="oc">Occitan</option>
          </select>
        </div>
      </div>
    </header>

    <main>
      <section>
        <h2 data-i18n="sections.searchFilter">Search &amp; Filter</h2>
        <form id="list-form">
          <div class="grid">
            <label>
              <span data-i18n="filters.searchLabel">Search query</span>
              <input name="q" placeholder="iPhone, sofa, bicycle" />
            </label>
            <label>
              <span data-i18n="filters.statusLabel">Status</span>
              <select name="status">
                <option value="" data-i18n="common.any">Any</option>
                <option value="draft" data-i18n="statusOptions.draft">draft</option>
                <option value="active" data-i18n="statusOptions.active">active</option>
                <option value="reserved" data-i18n="statusOptions.reserved">reserved</option>
                <option value="sold" data-i18n="statusOptions.sold">sold</option>
                <option value="archived" data-i18n="statusOptions.archived">archived</option>
              </select>
            </label>
            <label>
              <span data-i18n="filters.categoryLabel">Category</span>
              <select name="category">
                <option value="" data-i18n="common.any">Any</option>
                <option value="electronics" data-i18n="categoryOptions.electronics">electronics</option>
                <option value="furniture" data-i18n="categoryOptions.furniture">furniture</option>
                <option value="vehicles" data-i18n="categoryOptions.vehicles">vehicles</option>
                <option value="home" data-i18n="categoryOptions.home">home</option>
                <option value="fashion" data-i18n="categoryOptions.fashion">fashion</option>
                <option value="services" data-i18n="categoryOptions.services">services</option>
                <option value="other" data-i18n="categoryOptions.other">other</option>
              </select>
            </label>
            <label>
              <span data-i18n="filters.minPriceLabel">Min price (€)</span>
              <input name="min_price_cents" data-type="number" step="1" inputmode="numeric" />
            </label>
            <label>
              <span data-i18n="filters.maxPriceLabel">Max price (€)</span>
              <input name="max_price_cents" data-type="number" step="1" inputmode="numeric" />
            </label>
            <label>
              <span data-i18n="filters.postalCodeLabel">Postal code</span>
              <input name="postal_code" placeholder="67000" />
            </label>
            <label>
              <span data-i18n="filters.deliveryAvailableLabel">Delivery available</span>
              <select name="delivery_available" data-type="boolean">
                <option value="" data-i18n="common.any">Any</option>
                <option value="true" data-i18n="common.true">true</option>
                <option value="false" data-i18n="common.false">false</option>
              </select>
            </label>
          </div>
          <div class="inline">
            <button type="submit" data-i18n="actions.searchItems">Search items</button>
            <span class="muted" id="list-status">Ready</span>
          </div>
        </form>
      </section>

      <section id="results-section" class="is-hidden">
        <div class="panel-row">
          <div>
            <div class="inline" style="justify-content: space-between;">
              <h2 data-i18n="sections.results">Results</h2>
              <span class="muted" id="results-message"></span>
            </div>
            <div class="items" id="items-list"></div>
          </div>
          <div>
            <h2 data-i18n="sections.itemDetail">Item Detail</h2>
            <div class="detail" id="item-detail">
              <span class="muted">Select an item to view details.</span>
            </div>
            <div class="muted" id="detail-status" style="margin-top: 8px;">Idle</div>
          </div>
        </div>
      </section>
    </main>

      const listForm = document.getElementById("list-form");
      const languageSelect = document.getElementById("language-select");
      const listStatus = document.getElementById("list-status");
      const itemsList = document.getElementById("items-list");
      const resultsSection = document.getElementById("results-section");
      const resultsMessage = document.getElementById("results-message");
      const detail = document.getElementById("item-detail");
      const detailStatus = document.getElementById("detail-status");

      let translations = {};
      let currentLanguage = DEFAULT_LANGUAGE;
      let nextCursor = null;
      let lastItems = [];
      let selectedItem = null;
      let detailPlaceholderKey = "messages.selectItem";
      let listStatusState = { key: "messages.listReady", params: {}, isError: false };
      let detailStatusState = { key: "messages.detailIdle", params: {}, isError: false };
      let resultsMessageState = { key: null, params: {} };

      const request = async ({ path, method = "GET", body }) => {
        const options = {
          method,
          headers: { "Content-Type": "application/json" }
        };

        if (body !== undefined) {
          options.body = JSON.stringify(body);
        }

        let response;
        let payload;
        try {
          response = await fetch(`${baseUrl}${path}`, options);
          const text = await response.text();
          payload = text ? JSON.parse(text) : null;
        } catch (error) {
          return {
            ok: false,
            status: "network_error",
            payload: { error: String(error) }
          };
        }

        return {
          ok: response.ok,
          status: response.status,
          payload
        };
      };

      const getObjectPath = (obj, path) => {
        return path.split(".").reduce((value, segment) => {
          if (!value || typeof value !== "object") {
            return undefined;
          }
          return value[segment];
        }, obj);
      };

      const interpolate = (text, params = {}) => {
        return String(text).replace(/\{\{\s*(\w+)\s*\}\}/g, (_, key) => {
          return params[key] === undefined || params[key] === null ? "" : String(params[key]);
        });
      };

      const t = (key, params = {}) => {
        const raw = getObjectPath(translations, key);
        if (typeof raw !== "string") {
          return key;
        }
        return interpolate(raw, params);
      };

      const setStatus = (element, message, isError = false) => {
        element.textContent = message;
        element.classList.toggle("error", isError);
      };

      const setListStatus = (key, params = {}, isError = false) => {
        listStatusState = { key, params, isError };
        setStatus(listStatus, t(key, params), isError);
      };

      const setDetailStatus = (key, params = {}, isError = false) => {
        detailStatusState = { key, params, isError };
        setStatus(detailStatus, t(key, params), isError);
      };

      const setResultsMessage = (key = null, params = {}) => {
        resultsMessageState = { key, params };
        resultsMessage.textContent = key ? t(key, params) : "";
      };

      const refreshStatuses = () => {
        setStatus(listStatus, t(listStatusState.key, listStatusState.params), listStatusState.isError);
        setStatus(detailStatus, t(detailStatusState.key, detailStatusState.params), detailStatusState.isError);
        resultsMessage.textContent = resultsMessageState.key
          ? t(resultsMessageState.key, resultsMessageState.params)
          : "";
      };

      const loadTranslations = async (lang) => {
        if (translationCache.has(lang)) {
          return translationCache.get(lang);
        }

        try {
          const response = await fetch(`/i18n/${lang}.json`);
          if (response.ok) {
            const payload = await response.json();
            translationCache.set(lang, payload);
            return payload;
          }
        } catch (error) {
          // Fall back to embedded dictionaries when the server does not expose static files.
        }

        const fallback = FALLBACK_TRANSLATIONS[lang] || FALLBACK_TRANSLATIONS[DEFAULT_LANGUAGE];
        translationCache.set(lang, fallback);
        return fallback;
      };

      const resolveInitialLanguage = () => {
        const persisted = window.localStorage.getItem("lbp.language");
        if (persisted && SUPPORTED_LANGUAGES.includes(persisted)) {
          return persisted;
        }

        const browser = (window.navigator.language || DEFAULT_LANGUAGE).slice(0, 2).toLowerCase();
        return SUPPORTED_LANGUAGES.includes(browser) ? browser : DEFAULT_LANGUAGE;
      };

      const localizeEnumValue = (groupKey, rawValue, fallback = "") => {
        if (!rawValue) {
          return fallback;
        }

        const normalized = String(rawValue).toLowerCase();
        const translationKey = `${groupKey}.${normalized}`;
        const translated = t(translationKey);
        return translated === translationKey ? String(rawValue) : translated;
      };

      const applyStaticTranslations = () => {
        document.documentElement.lang = currentLanguage;
        document.title = t("app.pageTitle");

        document.querySelectorAll("[data-i18n]").forEach((element) => {
          const key = element.dataset.i18n;
          element.textContent = t(key);
        });

        listForm.querySelector('input[name="q"]').placeholder = t("filters.searchPlaceholder");
        listForm.querySelector('input[name="postal_code"]').placeholder = t("filters.postalPlaceholder");

        if (selectedItem) {
          renderDetail(selectedItem);
        } else {
          renderDetailPlaceholder();
        }

        if (!resultsSection.classList.contains("is-hidden")) {
          renderItems(itemsList, lastItems);
        }

        refreshStatuses();
      };

      const setLanguage = async (lang) => {
        const requested = SUPPORTED_LANGUAGES.includes(lang) ? lang : DEFAULT_LANGUAGE;
        translations = await loadTranslations(requested);
        currentLanguage = requested;

        window.localStorage.setItem("lbp.language", currentLanguage);
        languageSelect.value = currentLanguage;
        applyStaticTranslations();
      };

      const readForm = (form, { includeEmpty = false } = {}) => {
        const data = {};
        const fields = Array.from(form.querySelectorAll("input, select"));

        fields.forEach((field) => {
          if (!field.name) return;
          const raw = field.value;
          if (!includeEmpty && raw === "") return;

          let value = raw;
          const type = field.dataset.type;

          if (type === "number") {
            value = raw === "" ? undefined : Number(raw);
          } else if (type === "boolean") {
            if (raw === "") return;
            value = raw === "true";
          }

          if (value !== undefined) {
            data[field.name] = value;
          }
        });

        return data;
      };

      const formatPrice = (priceCents) => {
        if (priceCents === null || priceCents === undefined || Number.isNaN(priceCents)) {
          return t("messages.noValue");
        }
        const euros = Number(priceCents) / 100;
        return `€${euros.toFixed(2)}`;
      };

      const renderDetailPlaceholder = () => {
        detail.innerHTML = `<span class="muted">${t(detailPlaceholderKey)}</span>`;
      };

      const loadDetail = async (id) => {
        if (!id) return;

        setDetailStatus("messages.detailLoading");
        const result = await request({ path: `/v1/items/${id}` });

        if (!result.ok) {
          const message =
            result.status === "no_response" || result.status === "network_error"
              ? t("messages.errorServerNoResponse")
              : t("messages.errorHttp", { status: result.status });
          setStatus(detailStatus, message, true);
          detailStatusState = {
            key: result.status === "no_response" || result.status === "network_error"
              ? "messages.errorServerNoResponse"
              : "messages.errorHttp",
            params: result.status === "no_response" || result.status === "network_error" ? {} : { status: result.status },
            isError: true
          };
          selectedItem = null;
          detailPlaceholderKey = "messages.unableToLoadItem";
          renderDetailPlaceholder();
          return;
        }

        selectedItem = result.payload;
        detailPlaceholderKey = "messages.selectItem";
        setDetailStatus("messages.detailLoaded");
        renderDetail(result.payload);
      };

      const renderItems = (container, items) => {
        container.innerHTML = "";
        lastItems = Array.isArray(items) ? items : [];

        if (lastItems.length === 0) {
          container.innerHTML = `<span class="muted">${t("messages.noItems")}</span>`;
          return;
        }

        lastItems.forEach((item) => {
          const card = document.createElement("div");
          card.className = "item-card";

          const title = item.title ?? t("messages.untitled");
          const category = item.category
            ? localizeEnumValue("categoryOptions", item.category, String(item.category))
            : t("messages.noCategory");
          const condition = localizeEnumValue("conditions", item.condition, "");
          const status = localizeEnumValue("statusOptions", item.status, "");

          card.innerHTML = `
            <div class="inline">
              <span class="badge">#${item.id ?? t("messages.noValue")}</span>
              <span class="item-title">${title}</span>
            </div>
            <div class="muted">${category} · ${condition} · ${status}</div>
            <div>${t("messages.priceLabel")}: ${formatPrice(item.price_cents)}</div>
            <div class="muted">${item.city ?? ""} ${item.postal_code ?? ""} ${item.country ?? ""}</div>
          `;

          card.addEventListener("click", () => {
            loadDetail(item.id);
          });

          container.appendChild(card);
        });
      };

      const renderDetail = (item) => {
        detail.innerHTML = "";
        const header = document.createElement("div");
        header.innerHTML = `
          <div class="inline">
            <span class="badge">#${item.id ?? t("messages.noValue")}</span>
            <h3>${item.title ?? t("messages.untitled")}</h3>
          </div>
        `;

        const category = item.category
          ? localizeEnumValue("categoryOptions", item.category, String(item.category))
          : t("messages.noCategory");
        const condition = localizeEnumValue("conditions", item.condition, "");
        const status = localizeEnumValue("statusOptions", item.status, "");

        const meta = document.createElement("div");
        meta.className = "detail-list";
        meta.innerHTML = `
          <div class="status">${status}</div>
          <div>${category} · ${condition}</div>
          <div>${t("messages.priceLabel")}: ${formatPrice(item.price_cents)}</div>
          <div>${item.city ?? ""} ${item.postal_code ?? ""} ${item.country ?? ""}</div>
          <div>${t("messages.deliveryLabel")}: ${item.delivery_available ? t("messages.deliveryAvailable") : t("messages.deliveryNotAvailable")}</div>
        `;

        const description = document.createElement("div");
        description.textContent = item.description || t("messages.noDescription");

        const timestamps = document.createElement("div");
        timestamps.className = "muted";
        timestamps.textContent = `${t("messages.createdLabel")}: ${item.created_at ?? ""} · ${t("messages.updatedLabel")}: ${item.updated_at ?? ""}`;

        const images = document.createElement("div");
        images.className = "images";
        (item.images || []).forEach((image) => {
          const pill = document.createElement("span");
          pill.className = "image-pill";
          pill.textContent = image.url;
          images.appendChild(pill);
        });

        detail.appendChild(header);
        detail.appendChild(meta);
        detail.appendChild(description);
        detail.appendChild(images);
        detail.appendChild(timestamps);
      };

      const resetDetail = () => {
        selectedItem = null;
        detailPlaceholderKey = "messages.selectItem";
        renderDetailPlaceholder();
        setDetailStatus("messages.detailIdle");
      };

      const fetchItems = async (overrides = {}) => {
        setListStatus("messages.listLoading");
        resetDetail();
        resultsSection.classList.remove("is-hidden");
        setResultsMessage();

        const query = { ...readForm(listForm), ...overrides };
        if (query.min_price_cents !== undefined) {
          query.min_price_cents = Math.trunc(query.min_price_cents * 100);
        }
        if (query.max_price_cents !== undefined) {
          query.max_price_cents = Math.trunc(query.max_price_cents * 100);
        }

        const params = new URLSearchParams();
        Object.entries(query).forEach(([key, value]) => {
          if (value === undefined || value === "") return;
          params.set(key, String(value));
        });

        const path = `/v1/items${params.toString() ? `?${params}` : ""}`;
        const result = await request({ path });

        if (!result.ok) {
          const messageKey =
            result.status === "no_response" || result.status === "network_error"
              ? "messages.errorServerNoResponse"
              : "messages.errorHttp";
          const messageParams =
            messageKey === "messages.errorHttp" ? { status: result.status } : {};
          setListStatus(messageKey, messageParams, true);
          renderItems(itemsList, []);
          setResultsMessage("messages.couldNotLoadResults");
          return;
        }

        const items = result.payload?.items || [];
        setListStatus("messages.itemsLoaded", { count: items.length });
        setResultsMessage();
        renderItems(itemsList, items);
        nextCursor = result.payload?.next_cursor ?? null;
      };

      listForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        await fetchItems();
      });

      languageSelect.addEventListener("change", async (event) => {
        await setLanguage(event.target.value);
      });

      (async () => {
        await setLanguage(resolveInitialLanguage());
        setListStatus("messages.listReady");
        resetDetail();
      })();
    </script>
  </body>
</html>
